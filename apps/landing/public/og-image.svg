
    <svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" fill="none">
      <defs>
        <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="630" gradientUnits="userSpaceOnUse">
          <stop stop-color="#08111D" />
          <stop offset="0.6" stop-color="#06101A" />
          <stop offset="1" stop-color="#050D17" />
        </linearGradient>
        <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
          <feGaussianBlur stdDeviation="80" />
        </filter>
        <filter id="softGlow" x="-20%" y="-20%" width="140%" height="140%">
          <feGaussianBlur stdDeviation="30" />
        </filter>
        <linearGradient id="archGrad" x1="850" y1="250" x2="850" y2="630" gradientUnits="userSpaceOnUse">
          <stop stop-color="rgba(214,178,92,0.15)" />
          <stop offset="1" stop-color="rgba(214,178,92,0)" />
        </linearGradient>
      </defs>

      <rect width="1200" height="630" fill="url(#bg)" />
      
      <!-- Abstract floating orbs / gradients to make it look premium and spiritual -->
      <circle cx="900" cy="150" r="180" fill="rgba(214,178,92,0.15)" filter="url(#glow)" />
      <circle cx="1050" cy="450" r="280" fill="rgba(67,101,168,0.2)" filter="url(#glow)" />
      <circle cx="600" cy="300" r="300" fill="rgba(214,178,92,0.05)" filter="url(#glow)" />

      <!-- Minimalist arch accent (subtle Islamic geometric nod) -->
      <path d="M 800 630 L 800 300 A 180 180 0 0 1 1160 300 L 1160 630" stroke="url(#archGrad)" stroke-width="2" fill="none" filter="url(#softGlow)" />
      <path d="M 780 630 L 780 300 A 200 200 0 0 1 1180 300 L 1180 630" stroke="rgba(214,178,92,0.05)" stroke-width="1" fill="none" />
      
      <text x="100" y="100" fill="#D6B25C" font-size="24" font-family="Arial, sans-serif" font-weight="700" letter-spacing="2">imaan.app</text>
      <text x="100" y="240" fill="#F5F0E6" font-size="76" font-family="Georgia, serif" font-weight="400" letter-spacing="0.5">A spiritual companion</text><text x="100" y="330" fill="#F5F0E6" font-size="76" font-family="Georgia, serif" font-weight="400" letter-spacing="0.5">for the moments that</text><text x="100" y="420" fill="#F5F0E6" font-size="76" font-family="Georgia, serif" font-weight="400" letter-spacing="0.5">pull at the heart.</text>
      <text x="100" y="520" fill="#BDC5D2" font-size="28" font-family="Arial, sans-serif" font-weight="400">Join the imaan.app waitlist for launch updates,</text><text x="100" y="556" fill="#BDC5D2" font-size="28" font-family="Arial, sans-serif" font-weight="400">App Store release news, and early access.</text>
    </svg>
  